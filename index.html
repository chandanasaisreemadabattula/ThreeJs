<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Earth</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; }
      .hud {
        position: fixed; left: 12px; top: 12px;
        color: #fff; font: 12px/1.4 system-ui, sans-serif;
        background: rgba(0,0,0,.45); padding: 10px 12px; border-radius: 10px;
        user-select: none;
      }
      .search {
        position: fixed; left: 12px; top: 64px;
        width: min(520px, calc(100vw - 24px));
        color: #fff; font: 13px/1.4 system-ui, sans-serif;
        background: rgba(0,0,0,.45); padding: 10px 12px; border-radius: 10px;
        backdrop-filter: blur(6px);
      }
      .searchRow { display: flex; gap: 8px; }
      .search input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.18);
        outline: none;
        background: rgba(255,255,255,.06);
        color: #fff;
      }
      .search button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.18);
        background: rgba(255,255,255,.10);
        color: #fff;
        cursor: pointer;
      }
      .results {
        margin-top: 8px;
        max-height: 220px;
        overflow: auto;
        border-radius: 10px;
      }
      .resultItem {
        width: 100%;
        text-align: left;
        display: block;
        padding: 10px 10px;
        border: 0;
        background: rgba(255,255,255,.06);
        color: #fff;
        cursor: pointer;
      }
      .resultItem:hover { background: rgba(255,255,255,.12); }
      .muted { opacity: .8; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="hud">
      Drag to rotate • Scroll to zoom • Click Earth to drop marker
    </div>
    <div class="search" id="searchRoot">
      <div class="searchRow">
        <input id="searchInput" placeholder="Search a place (e.g., Hyderabad, Eiffel Tower, 17.3850 78.4867)" />
        <button id="searchBtn">Search</button>
      </div>
      <div class="muted" id="searchStatus"></div>
      <div class="results" id="searchResults"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
